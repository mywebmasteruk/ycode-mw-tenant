# Email the platform admin when safe-update PR CI turns green.

name: Core update notify ready

on:
  workflow_run:
    workflows: ["Build and safety checks"]
    types: [completed]

permissions:
  contents: read
  pull-requests: read

jobs:
  notify-ready:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Find safe-update PR for this branch
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const headBranch = context.payload.workflow_run.head_branch || '';
            if (!headBranch.startsWith('safe-ycode-update/')) {
              core.setOutput('found', 'false');
              return;
            }
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${headBranch}`,
              per_page: 1,
            });
            const pr = prs[0];
            if (!pr) {
              core.setOutput('found', 'false');
              return;
            }
            core.setOutput('found', 'true');
            core.setOutput('number', String(pr.number));
            core.setOutput('url', pr.html_url);

      - name: Notify admin — ready to approve
        if: steps.pr.outputs.found == 'true' && vars.ADMIN_DASHBOARD_NOTIFY_URL != ''
        env:
          NOTIFY_URL: ${{ vars.ADMIN_DASHBOARD_NOTIFY_URL }}
          NOTIFY_SECRET: ${{ secrets.CORE_UPDATE_NOTIFY_SECRET }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_URL: ${{ steps.pr.outputs.url }}
        run: |
          if [ -z "$NOTIFY_SECRET" ]; then exit 0; fi
          curl -fsS -X POST "$NOTIFY_URL" \
            -H "Content-Type: application/json" \
            -H "X-Core-Update-Notify-Secret: $NOTIFY_SECRET" \
            -d "$(jq -n \
              --arg event "update_ready" \
              --arg message "All automated checks passed. Open the admin dashboard, preview the site, then click Approve when satisfied." \
              --argjson prNumber "$PR_NUMBER" \
              --arg prUrl "$PR_URL" \
              '{event: $event, message: $message, prNumber: $prNumber, prUrl: $prUrl}')"
