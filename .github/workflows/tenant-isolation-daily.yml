# Daily tenant isolation regression guard.
# Runs one hour after the core-update cron (06:00 UTC) so upstream merges
# are caught before the next business day.
#
# Alerts (v1): workflow failure + GitHub summary. Enable GitHub Actions email
# notifications on this repo for on-failure alerts. Optional webhooks use the
# same CORE_UPDATE_NOTIFY_SECRET as core-update-operator when configured:
#   ADMIN_DASHBOARD_ISOLATION_LOG_URL — records pass/fail history in admin Logs
#   ADMIN_DASHBOARD_NOTIFY_URL — failure email with Vitest output (Resend via admin dashboard)

name: Daily tenant isolation check

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tenant-isolation-daily
  cancel-in-progress: false

jobs:
  tenant-isolation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tenant isolation tests
        id: isolation
        run: |
          set -o pipefail
          START_MS=$(($(date +%s) * 1000))
          echo "start_ms=$START_MS" >> "$GITHUB_OUTPUT"
          bash scripts/check-tenant-isolation.sh 2>&1 | tee isolation-output.txt

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## Daily tenant isolation check"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Workflow | \`${{ github.workflow }}\` |"
            echo "| Run | [\`${{ github.run_id }}\`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
            echo "| Branch | \`${{ github.ref_name }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Conclusion | \`${{ job.status }}\` |"
            echo ""
            if [ "${{ job.status }}" = "success" ]; then
              echo "All tenant isolation Vitest files passed. See \`scripts/check-tenant-isolation.sh\` for the exact list."
            else
              echo "**Failure:** at least one tenant isolation test failed. Reproduce locally:"
              echo ""
              echo "\`\`\`bash"
              echo "cd ycode-mw-tenant"
              echo "npm ci"
              echo "bash scripts/check-tenant-isolation.sh"
              echo "\`\`\`"
              echo ""
              echo "Then follow \`masjidweb-backend/docs/TENANT_ISOLATION_DAILY_CHECK.md\` and \`docs/AGENT_INCIDENT_PLAYBOOK.md\`."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Report result to admin dashboard
        if: always() && vars.ADMIN_DASHBOARD_ISOLATION_LOG_URL != ''
        env:
          LOG_URL: ${{ vars.ADMIN_DASHBOARD_ISOLATION_LOG_URL }}
          NOTIFY_SECRET: ${{ secrets.CORE_UPDATE_NOTIFY_SECRET }}
        run: |
          if [ -z "$NOTIFY_SECRET" ]; then
            echo "CORE_UPDATE_NOTIFY_SECRET not set — skip isolation log ingest"
            exit 0
          fi
          END_MS=$(($(date +%s) * 1000))
          START_MS="${{ steps.isolation.outputs.start_ms }}"
          if [ -n "$START_MS" ]; then
            DURATION_MS=$((END_MS - START_MS))
          else
            DURATION_MS=0
          fi
          if [ "${{ job.status }}" = "success" ]; then
            STATUS="pass"
            SUMMARY="All tenant isolation Vitest files passed"
            FAILURE_OUTPUT=""
          else
            STATUS="fail"
            if [ -f isolation-output.txt ]; then
              FAILURE_OUTPUT=$(cat isolation-output.txt)
            else
              FAILURE_OUTPUT="(no test output captured)"
            fi
            SUMMARY=$(echo "$FAILURE_OUTPUT" | grep -E 'FAIL |AssertionError|Tests +[0-9]+ failed' | head -n 3 | tr '\n' ' ' | sed 's/  */ /g')
            if [ -z "$SUMMARY" ]; then
              SUMMARY="Tenant isolation Vitest suite failed"
            fi
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          jq -n \
            --arg status "$STATUS" \
            --argjson durationMs "$DURATION_MS" \
            --arg repository "${{ github.repository }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg commitSha "${{ github.sha }}" \
            --arg workflowRunId "${{ github.run_id }}" \
            --arg workflowRunUrl "$RUN_URL" \
            --arg workflowName "${{ github.workflow }}" \
            --arg summary "$SUMMARY" \
            --arg failureOutput "$FAILURE_OUTPUT" \
            '{
              status: $status,
              durationMs: $durationMs,
              repository: $repository,
              branch: $branch,
              commitSha: $commitSha,
              workflowRunId: $workflowRunId,
              workflowRunUrl: $workflowRunUrl,
              workflowName: $workflowName,
              summary: $summary,
              failureOutput: (if $failureOutput == "" then null else $failureOutput end)
            }' > isolation-payload.json
          curl -fsS -X POST "$LOG_URL" \
            -H "Content-Type: application/json" \
            -H "X-Core-Update-Notify-Secret: $NOTIFY_SECRET" \
            -d @isolation-payload.json

      - name: Send failure email alert
        if: failure()
        env:
          NOTIFY_URL: ${{ vars.ADMIN_DASHBOARD_NOTIFY_URL }}
          NOTIFY_SECRET: ${{ secrets.CORE_UPDATE_NOTIFY_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CORE_UPDATE_ALERT_EMAIL: ${{ secrets.CORE_UPDATE_ALERT_EMAIL }}
          TENANT_ISOLATION_ALERT_EMAIL: ${{ secrets.TENANT_ISOLATION_ALERT_EMAIL }}
          CORE_UPDATE_EMAIL_FROM: ${{ secrets.CORE_UPDATE_EMAIL_FROM }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: bash scripts/send-tenant-isolation-failure-alert.sh isolation-output.txt
