# After a safe Ycode core update is merged to main, wait for Netlify production
# and post a GitHub summary + PR comment. GitHub emails repo watchers who enable
# Actions notifications when this workflow finishes (success or failure).
#
# Skips ordinary pushes to main that are not safe-ycode-update merge commits.

name: Core update production deploy

on:
  push:
    branches: [main]

concurrency:
  group: core-update-deploy-notify-${{ github.sha }}
  cancel-in-progress: false

jobs:
  notify-when-live:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Detect safe Ycode core update merge
        id: gate
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail
          msg="${COMMIT_MESSAGE:-}"
          if ! echo "$msg" | grep -qE 'Merge pull request #[0-9]+ from .*/safe-ycode-update/'; then
            echo "is_core_update=false" >> "$GITHUB_OUTPUT"
            echo "Not a safe-ycode-update merge — skipping deploy notification."
            exit 0
          fi
          pr_number="$(echo "$msg" | sed -n 's/^Merge pull request #\([0-9][0-9]*\).*/\1/p')"
          echo "is_core_update=true" >> "$GITHUB_OUTPUT"
          echo "pr_number=${pr_number}" >> "$GITHUB_OUTPUT"
          echo "Safe Ycode core update merge detected (PR #${pr_number})."

      - uses: actions/checkout@v4
        if: steps.gate.outputs.is_core_update == 'true'

      - name: Read builder package version
        if: steps.gate.outputs.is_core_update == 'true'
        id: pkg
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      # Netlify does NOT post GitHub commit statuses for production (main) deploys —
      # only deploy-preview checks on PRs. So we query the Netlify API directly for
      # the production deploy whose commit_ref matches this merge SHA.
      - name: Check Netlify credentials
        if: steps.gate.outputs.is_core_update == 'true'
        id: creds
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          set -euo pipefail
          if [ -n "${NETLIFY_AUTH_TOKEN:-}" ] && [ -n "${NETLIFY_SITE_ID:-}" ]; then
            echo "has_netlify=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_netlify=false" >> "$GITHUB_OUTPUT"
            echo "::notice::NETLIFY_AUTH_TOKEN and/or NETLIFY_SITE_ID not set — skipping live deploy confirmation."
          fi

      - name: Wait for Netlify production deploy
        if: steps.gate.outputs.is_core_update == 'true' && steps.creds.outputs.has_netlify == 'true'
        id: netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          api="https://api.netlify.com/api/v1/sites/${NETLIFY_SITE_ID}/deploys?per_page=50"
          deadline=$((SECONDS + 1800))

          while [ "$SECONDS" -lt "$deadline" ]; do
            payload="$(curl -fsS -H "Authorization: Bearer ${NETLIFY_AUTH_TOKEN}" "$api" || echo '[]')"
            match="$(echo "$payload" | jq -c --arg sha "$SHA" '
              [ .[]
                | select(.commit_ref == $sha)
                | select((.context // "production") == "production")
              ] | first // empty
            ')"

            if [ -n "$match" ] && [ "$match" != "null" ]; then
              state="$(echo "$match" | jq -r '.state // "pending"')"
              url="$(echo "$match" | jq -r '.ssl_url // .deploy_ssl_url // .links.permalink // empty')"
              echo "[$(date -u +%H:%M:%S)] Netlify production deploy state: ${state}"
              case "$state" in
                ready)
                  echo "state=success" >> "$GITHUB_OUTPUT"
                  echo "url=${url}" >> "$GITHUB_OUTPUT"
                  exit 0
                  ;;
                error)
                  echo "state=failure" >> "$GITHUB_OUTPUT"
                  echo "url=${url}" >> "$GITHUB_OUTPUT"
                  echo "::error::Netlify production deploy failed for ${SHA}"
                  exit 1
                  ;;
                *)
                  : # new/enqueued/building/processing/uploading → keep waiting
                  ;;
              esac
            else
              echo "[$(date -u +%H:%M:%S)] No production deploy for ${SHA:0:12} yet…"
            fi
            sleep 30
          done

          echo "state=timeout" >> "$GITHUB_OUTPUT"
          echo "::error::Timed out waiting for Netlify production deploy (30 minutes)."
          exit 1

      - name: Note merge (Netlify confirmation skipped)
        if: steps.gate.outputs.is_core_update == 'true' && steps.creds.outputs.has_netlify != 'true'
        env:
          PR_NUMBER: ${{ steps.gate.outputs.pr_number }}
          VERSION: ${{ steps.pkg.outputs.version }}
          SHA: ${{ github.sha }}
        run: |
          {
            echo "## Ycode core update merged to main"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| PR | #${PR_NUMBER} |"
            echo "| Version | \`${VERSION}\` |"
            echo "| Commit | \`${SHA:0:12}\` |"
            echo ""
            echo "Netlify builds this commit automatically (repo + branch linked in Netlify)."
            echo ""
            echo "> Live-deploy confirmation was **skipped** because the \`NETLIFY_AUTH_TOKEN\` and \`NETLIFY_SITE_ID\` repository secrets are not set."
            echo "> Add them under **Settings → Secrets and variables → Actions** to get an automatic production-live check and PR comment."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Write job summary
        if: steps.gate.outputs.is_core_update == 'true' && steps.netlify.outputs.state == 'success'
        env:
          PR_NUMBER: ${{ steps.gate.outputs.pr_number }}
          VERSION: ${{ steps.pkg.outputs.version }}
          DEPLOY_URL: ${{ steps.netlify.outputs.url }}
          SHA: ${{ github.sha }}
        run: |
          {
            echo "## Ycode core update — production deploy complete"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| PR | #${PR_NUMBER} |"
            echo "| Version | \`${VERSION}\` |"
            echo "| Commit | \`${SHA:0:12}\` |"
            echo "| Netlify | ${DEPLOY_URL:-see Netlify dashboard} |"
            echo ""
            echo "Tenant subdomains now serve this build. If something looks wrong, use **Maintenance → Recovery** on the admin dashboard (restore previous live build or full rollback when a checkpoint exists)."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on merged pull request
        if: steps.gate.outputs.is_core_update == 'true' && steps.netlify.outputs.state == 'success'
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.gate.outputs.pr_number }}
          VERSION: ${{ steps.pkg.outputs.version }}
          DEPLOY_URL: ${{ steps.netlify.outputs.url }}
        with:
          script: |
            const prNumber = Number.parseInt(process.env.PR_NUMBER || '', 10);
            if (!Number.isFinite(prNumber) || prNumber < 1) return;
            const version = process.env.VERSION || 'unknown';
            const deployUrl = process.env.DEPLOY_URL || '';
            const sha = context.sha.slice(0, 12);
            const body = [
              '### Ycode core update — production deploy complete',
              '',
              `- **Version:** \`${version}\``,
              `- **Commit:** \`${sha}\``,
              deployUrl ? `- **Netlify:** ${deployUrl}` : '- **Netlify:** check the site deploys tab',
              '',
              'Live tenant builder traffic is on this build. If rollback is needed, use **Maintenance → Recovery** on the admin dashboard.',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
