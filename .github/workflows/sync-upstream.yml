name: Create safe Ycode update PR

on:
  workflow_dispatch:
  schedule:
    # Daily 06:00 UTC while validating the core-update pipeline.
    # When confident, switch to weekly: "0 6 * * 1" (Mondays only).
    - cron: "0 6 * * *"

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write

jobs:
  # A fresh PR every day regardless of whether yesterday's landed just buries
  # the backlog: 17 straight safe-ycode-update PRs (2026-05-22 to 2026-06-27)
  # were closed unmerged, each superseded by the next day's before anyone
  # resolved it. Skip creating a new one while an old one is still open, so
  # the backlog stops growing silently and someone has to actually deal with
  # the stuck PR.
  check-existing:
    runs-on: ubuntu-latest
    outputs:
      has_open_pr: ${{ steps.check.outputs.has_open_pr }}
    steps:
      - name: Check for an unresolved safe-update PR
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing="$(gh pr list --repo "$GITHUB_REPOSITORY" --state open --json number,headRefName,url \
            --jq '[.[] | select(.headRefName | startswith("safe-ycode-update/"))] | .[0] // empty')"
          if [ -n "$existing" ]; then
            number="$(echo "$existing" | jq -r '.number')"
            url="$(echo "$existing" | jq -r '.url')"
            echo "has_open_pr=true" >> "$GITHUB_OUTPUT"
            echo "PR #$number is still open and unresolved ($url) — skipping today's run so it doesn't get buried." | tee -a "$GITHUB_STEP_SUMMARY"
          else
            echo "has_open_pr=false" >> "$GITHUB_OUTPUT"
            echo "No open safe-update PR — proceeding." | tee -a "$GITHUB_STEP_SUMMARY"
          fi

  create-update-pr:
    needs: check-existing
    if: needs.check-existing.outputs.has_open_pr != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out MasjidWeb fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Configure merge hygiene
        run: bash scripts/git-merge-hygiene.sh

      - name: Restore rerere cache
        uses: actions/cache@v4
        with:
          path: .git/rr-cache
          key: rerere-${{ runner.os }}-v1
          restore-keys: |
            rerere-${{ runner.os }}-v1

      - name: Fetch upstream Ycode
        run: |
          git remote add upstream https://github.com/ycode/ycode.git 2>/dev/null || git remote set-url upstream https://github.com/ycode/ycode.git
          git fetch upstream --tags

      - name: Prepare update branch
        id: branch
        run: |
          latest_tag="$(git tag --list 'v*' --sort=-v:refname | head -n 1)"
          if [ -z "$latest_tag" ]; then
            latest_tag="$(git rev-parse --short upstream/main)"
          fi
          safe_tag="$(echo "$latest_tag" | tr '/' '-')"
          branch="safe-ycode-update/${safe_tag}"
          git checkout -B "$branch" origin/main
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"

      - name: Merge upstream into update branch
        id: merge
        continue-on-error: true
        run: |
          set +e
          git rerere
          git merge --no-ff --no-edit upstream/main
          status=$?
          git rerere
          echo "status=$status" >> "$GITHUB_OUTPUT"
          git diff --name-only --diff-filter=U > /tmp/update-conflicts.txt
          exit 0

      - name: Generate conflict safety report
        if: steps.merge.outputs.status != '0'
        continue-on-error: true
        env:
          UPDATE_BASE_REF: origin/main
          UPDATE_SAFETY_REPORT_PATH: /tmp/update-safety-report.md
          UPDATE_SAFETY_REPORT_JSON_PATH: /tmp/update-safety-report.json
        run: |
          npx --yes tsx scripts/check-update-safety.ts || true
          cat /tmp/update-safety-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Install dependencies for safety report
        if: steps.merge.outputs.status == '0'
        run: npm ci

      - name: Generate safety report
        if: steps.merge.outputs.status == '0'
        id: safety
        env:
          UPDATE_BASE_REF: origin/main
          UPDATE_SAFETY_REPORT_PATH: /tmp/update-safety-report.md
          UPDATE_SAFETY_REPORT_JSON_PATH: /tmp/update-safety-report.json
        run: |
          npm run updates:safety-check
          cat /tmp/update-safety-report.md >> "$GITHUB_STEP_SUMMARY"

      # A clean merge (no conflicts) used to be marked "ready" on git-merge
      # success alone, relying entirely on ci-build-check.yml for real
      # verification. That workflow is pull_request-triggered on a
      # bot-authored branch and routinely lands in GitHub's action_required
      # state (confirmed: 10+ occurrences across safe-ycode-update branches
      # between 2026-06-13 and 2026-07-01), where it just sits until a human
      # notices and manually approves/reruns it in the Actions tab — which,
      # in 5+ weeks of this pipeline running, never happened in time for a
      # single update to land. Run the same verification here, in a job that
      # is NOT gated the same way (schedule/workflow_dispatch), so PR
      # readiness never depends on that stuck gate. Mirrors the verification
      # ai-repair-safe-update.yml already runs for the repair path.
      - name: Verify clean merge (type-check, tenant isolation, build)
        if: steps.merge.outputs.status == '0'
        id: verify
        run: |
          set +e
          npm run type-check && \
          bash scripts/check-tenant-isolation.sh && \
          npm run updates:isolation-audit && \
          npx vitest run lib/masjidweb/bootstrap-tenant-owner.test.ts lib/masjidweb/provisioned-tenant-rbac.test.ts && \
          npm run build
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Autopilot report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-update-autopilot-report
          path: |
            /tmp/update-safety-report.md
            /tmp/update-safety-report.json
          if-no-files-found: ignore

      - name: Check whether update branch has changes
        id: changes
        run: |
          if [ "${{ steps.merge.outputs.status }}" != "0" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          elif git diff --quiet origin/main...HEAD; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push update branch
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          if [ "${{ steps.merge.outputs.status }}" != "0" ]; then
            git add -A
            git commit -m "chore: capture conflicted Ycode update attempt" || true
          fi
          git push --force-with-lease origin "${{ steps.branch.outputs.branch }}"

      - name: Open or update pull request
        if: steps.changes.outputs.has_changes == 'true'
        id: open_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.branch.outputs.branch }}
          LATEST_TAG: ${{ steps.branch.outputs.latest_tag }}
          MERGE_STATUS: ${{ steps.merge.outputs.status }}
          VERIFY_STATUS: ${{ steps.verify.outputs.status }}
        run: |
          gh label create "needs-developer-review" --repo "$GITHUB_REPOSITORY" --color "B60205" --description "Requires developer review before merge" || true
          gh label create "tenant-sensitive-update" --repo "$GITHUB_REPOSITORY" --color "D93F0B" --description "Touches tenant-sensitive MasjidWeb/Ycode files" || true
          gh label create "safe-ycode-update" --repo "$GITHUB_REPOSITORY" --color "0E8A16" --description "Created by the safe Ycode update workflow" || true

          report="$(cat /tmp/update-safety-report.md 2>/dev/null || echo 'Safety report was not generated.')"
          # verify_ok is true only for a clean merge (status 0) whose local
          # verification (type-check/isolation/tests/build) also exited 0.
          # Conflicted merges never run verification, so VERIFY_STATUS is
          # empty for them — treated as not-ok, same as any other failure.
          if [ "$MERGE_STATUS" = "0" ] && [ "$VERIFY_STATUS" = "0" ]; then
            verify_ok="true"
          else
            verify_ok="false"
          fi

          if [ "$MERGE_STATUS" = "0" ] && [ "$verify_ok" = "true" ]; then
            title="chore: update Ycode core to ${LATEST_TAG}"
            draft_flag=""
            status_text="The upstream merge completed cleanly and passed local verification (type-check, tenant isolation audit, tenant safety tests, production build). Preview it, then approve."
          elif [ "$MERGE_STATUS" = "0" ]; then
            title="chore: review Ycode core update to ${LATEST_TAG}"
            draft_flag="--draft"
            status_text="The upstream merge completed but LOCAL VERIFICATION FAILED (type-check, tenant isolation audit, tenant safety tests, or production build). Do not approve — a developer needs to investigate the workflow run before this can proceed."
          else
            title="chore: review Ycode core update to ${LATEST_TAG}"
            draft_flag="--draft"
            status_text="The upstream merge has conflicts. This PR is intentionally draft and needs developer review."
          fi

          body="$(cat <<EOF
          ## Summary
          ${status_text}

          ## Safety report

          \`\`\`
          ${report}
          \`\`\`

          ## What to do
          - If checks pass and the PR is not draft, review and merge when ready.
          - If this PR is draft or has conflicts, do not merge until a developer resolves it.
          - Production deploys only after this PR is merged into main.
          EOF
          )"

          existing_pr="$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$BRANCH" --json number --jq '.[0].number // empty')"
          if [ -n "$existing_pr" ]; then
            gh pr edit "$existing_pr" --repo "$GITHUB_REPOSITORY" --title "$title" --body "$body"
            pr_number="$existing_pr"
          else
            gh pr create --repo "$GITHUB_REPOSITORY" --base main --head "$BRANCH" --title "$title" --body "$body" $draft_flag
            pr_number="$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$BRANCH" --json number --jq '.[0].number')"
          fi

          if [ "$verify_ok" = "true" ]; then
            gh pr ready "$pr_number" --repo "$GITHUB_REPOSITORY" 2>/dev/null || true
          else
            gh pr ready "$pr_number" --repo "$GITHUB_REPOSITORY" --undo 2>/dev/null || true
          fi

          gh pr edit "$pr_number" --repo "$GITHUB_REPOSITORY" --add-label "safe-ycode-update"
          if [ "$verify_ok" != "true" ] || grep -q "Status: high" /tmp/update-safety-report.md; then
            gh pr edit "$pr_number" --repo "$GITHUB_REPOSITORY" --add-label "needs-developer-review,tenant-sensitive-update"
          fi

          if [ "$MERGE_STATUS" = "0" ]; then
            if [ "$verify_ok" = "true" ]; then
              comment="Local verification passed outside the normal PR CI gate: type-check, tenant isolation audit, tenant safety tests, and production build all green. (ci-build-check.yml may still show action_required — a known GitHub limitation for bot-authored PR branches — but this PR's readiness does not depend on it.)"
            else
              comment="Local verification FAILED — see the **Verify clean merge** step in this run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}. Do not approve until this is fixed."
            fi
            gh pr comment "$pr_number" --repo "$GITHUB_REPOSITORY" --body "$comment"
          fi

          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "verify_ok=$verify_ok" >> "$GITHUB_OUTPUT"

      # Repair dispatch (with escalation from mechanical-only to LLM-assisted
      # repair when needed) is centralized in core-update-operator.yml, which
      # already runs on workflow_run after this job completes. Dispatching it
      # again from here as well caused every conflicted PR to get two
      # redundant mechanical-only repair runs fired within seconds of each
      # other (confirmed in run history: e.g. 06-29 05:44:44 and 05:44:54).

      - name: No upstream changes found
        if: steps.changes.outputs.has_changes == 'false'
        run: echo "No upstream changes found. No pull request was created."
