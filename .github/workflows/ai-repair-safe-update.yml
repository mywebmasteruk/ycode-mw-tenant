name: Mechanical repair safe update PR

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Safe update pull request number
        required: true
        type: string
      mechanical_only:
        description: Only rerere + lockfile regen (no LLM)
        required: false
        type: boolean
        default: true
      max_llm_files:
        description: Max files to send to OpenRouter per run
        required: false
        type: string
        default: "8"
      repair_mode:
        description: Repair mode for blocked safe-update PRs
        required: false
        type: choice
        default: autopilot
        options:
          - autopilot
          - premium_ai
      openrouter_model:
        description: OpenRouter model ID or latest_claude_frontier
        required: false
        type: string
        default: "latest_claude_frontier"
      copilot_escalation_mode:
        description: Optional Copilot escalation when deterministic repair blocks
        required: false
        type: choice
        default: none
        options:
          - none
          - comment
          - issue
          - assign

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  ai-repair:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve PR head branch
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number.parseInt('${{ inputs.pr_number }}', 10);
            if (!Number.isFinite(prNumber) || prNumber < 1) {
              core.setFailed('Invalid pr_number');
              return;
            }
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            core.setOutput('head_ref', pr.head.ref);
            core.setOutput('html_url', pr.html_url);

      - name: Checkout PR branch
        run: |
          git fetch origin "${{ steps.pr.outputs.head_ref }}"
          git checkout "${{ steps.pr.outputs.head_ref }}"

      - name: Copy AI repair tooling from main
        run: |
          git fetch origin main
          git checkout origin/main -- \
            scripts/ai-repair-safe-update.ts \
            scripts/core-update/run-autopilot-repair.ts \
            scripts/core-update/run-premium-ai-repair.ts \
            scripts/core-update/create-copilot-escalation.ts \
            scripts/reapply-tier2-seams.ts \
            scripts/check-autopilot-guard.ts \
            scripts/check-update-safety.ts \
            scripts/git-merge-hygiene.sh \
            lib/masjidweb/autopilot-repair.ts \
            lib/masjidweb/premium-ai-patch.ts \
            lib/masjidweb/copilot-escalation.ts \
            lib/masjidweb/reapply-tier2-seams.ts \
            lib/masjidweb/openrouter-repair.ts \
            lib/masjidweb/merge-conflict-hunks.ts \
            lib/masjidweb/update-conflict-tiers.ts \
            lib/masjidweb/update-safety-check.ts \
            .gitattributes
          git checkout origin/main -- docs/masjidweb-core-seams.md 2>/dev/null || true

      - name: Fetch upstream Ycode for tier-2 seam re-apply
        run: |
          git remote add upstream https://github.com/ycode/ycode.git 2>/dev/null || true
          git fetch upstream main

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Configure merge hygiene
        run: bash scripts/git-merge-hygiene.sh

      - name: Restore rerere cache
        uses: actions/cache@v4
        with:
          path: .git/rr-cache
          key: rerere-${{ runner.os }}-v1
          restore-keys: |
            rerere-${{ runner.os }}-v1

      - name: Run deterministic Autopilot repair
        id: deterministic_repair
        continue-on-error: true
        env:
          AUTOPILOT_REPAIR_REPORT_PATH: /tmp/autopilot-repair-report.md
          AUTOPILOT_REPAIR_REPORT_JSON_PATH: /tmp/autopilot-repair-report.json
        run: npx --yes tsx scripts/core-update/run-autopilot-repair.ts

      - name: Run AI conflict repair
        id: repair
        if: steps.deterministic_repair.outputs.status == 'failed' && inputs.mechanical_only == false && inputs.repair_mode == 'autopilot'
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ inputs.openrouter_model || vars.OPENROUTER_REPAIR_MODEL }}
          OPENROUTER_REPAIR_MODEL_HIGH_RISK: ${{ vars.OPENROUTER_REPAIR_MODEL_HIGH_RISK }}
          OPENROUTER_SITE_URL: ${{ vars.OPENROUTER_SITE_URL }}
          OPENROUTER_APP_NAME: ${{ vars.OPENROUTER_APP_NAME }}
          AI_REPAIR_MECHANICAL_ONLY: ${{ inputs.mechanical_only }}
          AI_REPAIR_SKIP_TIER2_LLM: "true"
          AI_REPAIR_MAX_LLM_FILES: ${{ inputs.max_llm_files }}
        run: npx --yes tsx scripts/ai-repair-safe-update.ts

      - name: Check Premium AI configuration
        if: steps.deterministic_repair.outputs.status != 'success' && inputs.repair_mode == 'premium_ai'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "OPENROUTER_API_KEY is missing. Add it as a GitHub Actions secret before running Premium AI Repair." >&2
            exit 2
          fi

      - name: Run Premium AI patch repair
        id: premium_repair
        if: steps.deterministic_repair.outputs.status != 'success' && inputs.repair_mode == 'premium_ai'
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_REPAIR_MODEL: ${{ inputs.openrouter_model || vars.OPENROUTER_REPAIR_MODEL || 'latest_claude_frontier' }}
          OPENROUTER_SITE_URL: ${{ vars.OPENROUTER_SITE_URL }}
          OPENROUTER_APP_NAME: ${{ vars.OPENROUTER_APP_NAME }}
          PREMIUM_AI_REPAIR_REPORT_PATH: /tmp/premium-ai-repair-report.md
          PREMIUM_AI_REPAIR_REPORT_JSON_PATH: /tmp/premium-ai-repair-report.json
          AUTOPILOT_REPAIR_REPORT_PATH: /tmp/autopilot-repair-report.md
          AUTOPILOT_REPAIR_REPORT_JSON_PATH: /tmp/autopilot-repair-report.json
          PREMIUM_AI_REPAIR_MAX_FILES: ${{ inputs.max_llm_files }}
        run: npx --yes tsx scripts/core-update/run-premium-ai-repair.ts

      - name: Upload deterministic Autopilot repair report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-update-autopilot-repair
          path: |
            /tmp/autopilot-repair-report.md
            /tmp/autopilot-repair-report.json
          if-no-files-found: ignore

      - name: Upload Premium AI repair report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-update-premium-ai-repair
          path: |
            /tmp/premium-ai-repair-report.md
            /tmp/premium-ai-repair-report.json
          if-no-files-found: ignore

      - name: Create Copilot escalation request
        if: >-
          (
            (steps.deterministic_repair.outputs.status == 'blocked' && (inputs.repair_mode != 'premium_ai' || steps.premium_repair.outputs.status != 'applied'))
            || (
              steps.deterministic_repair.outputs.status == 'failed'
              && (inputs.mechanical_only == true || (inputs.repair_mode == 'autopilot' && steps.repair.outcome != 'success') || (inputs.repair_mode == 'premium_ai' && steps.premium_repair.outputs.status != 'applied'))
            )
          )
          && (
            inputs.copilot_escalation_mode != 'none'
            || vars.ENABLE_COPILOT_ESCALATION == 'true'
          )
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ inputs.pr_number }}
          AUTOPILOT_REPAIR_REPORT_PATH: /tmp/autopilot-repair-report.md
          AUTOPILOT_REPAIR_REPORT_JSON_PATH: /tmp/autopilot-repair-report.json
          WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COPILOT_ESCALATION_CREATE_ISSUE: ${{ inputs.copilot_escalation_mode == 'issue' || inputs.copilot_escalation_mode == 'assign' }}
          COPILOT_ESCALATION_ASSIGN_COPILOT: ${{ inputs.copilot_escalation_mode == 'assign' }}
        run: npx --yes tsx scripts/core-update/create-copilot-escalation.ts

      - name: Stop when repair remains blocked
        if: >-
          (steps.deterministic_repair.outputs.status == 'blocked' && (inputs.repair_mode != 'premium_ai' || steps.premium_repair.outputs.status != 'applied'))
          || (
            steps.deterministic_repair.outputs.status == 'failed'
            && (
              inputs.mechanical_only == true
              || (inputs.repair_mode == 'autopilot' && steps.repair.outcome != 'success')
              || (inputs.repair_mode == 'premium_ai' && steps.premium_repair.outputs.status != 'applied')
            )
          )
        run: |
          echo "Automated repair could not safely resolve all conflicts. See core-update repair artifacts."
          if [ "${{ inputs.copilot_escalation_mode }}" != "none" ] || [ "${{ vars.ENABLE_COPILOT_ESCALATION }}" = "true" ]; then
            echo "A constrained Copilot escalation request was created or updated. This is not merge approval."
          fi
          exit 2

      - name: Install dependencies for verification
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Critical-exports completeness check
        run: |
          # Write the list of files changed by the repair so the script only
          # checks files that were actually touched.
          git diff --name-only > /tmp/repair-changed-files.txt || true
          git diff --cached --name-only >> /tmp/repair-changed-files.txt || true
          bash scripts/check-repair-completeness.sh --changed-files /tmp/repair-changed-files.txt

      - name: Autopilot tenant guard
        env:
          AUTOPILOT_GUARD_REPORT_PATH: /tmp/autopilot-guard-report.md
          AUTOPILOT_GUARD_REPORT_JSON_PATH: /tmp/autopilot-guard-report.json
        run: |
          npx --yes tsx scripts/check-autopilot-guard.ts
          cat /tmp/autopilot-guard-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Tenant isolation guard
        run: bash scripts/check-tenant-isolation.sh

      - name: Type-check repaired branch
        run: npm run type-check

      - name: Upload Autopilot guard report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-update-autopilot-guard
          path: |
            /tmp/autopilot-guard-report.md
            /tmp/autopilot-guard-report.json
          if-no-files-found: ignore

      - name: Tenant safety tests
        id: safety_tests
        run: >-
          npx vitest run
          lib/masjidweb/bootstrap-tenant-owner.test.ts
          lib/masjidweb/provisioned-tenant-rbac.test.ts

      - name: Verify production build
        id: build
        if: steps.safety_tests.outcome == 'success'
        run: npm run build

      - name: Commit and push repairs
        id: push
        if: steps.safety_tests.outcome == 'success' && steps.build.outcome == 'success'
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No file changes to push."
            exit 0
          fi
          git commit -m "fix(ai): resolve safe update conflicts [automated]"
          git push origin HEAD
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Re-run update safety check
        if: steps.push.outputs.changed == 'true'
        continue-on-error: true
        env:
          UPDATE_BASE_REF: origin/main
        run: npm run updates:safety-check

      - name: Mark PR ready after successful repair
        if: >-
          steps.push.outputs.changed == 'true'
          && steps.safety_tests.outcome == 'success'
          && steps.build.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr ready "${{ inputs.pr_number }}" --repo "$GITHUB_REPOSITORY"

      - name: Comment on pull request
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number.parseInt('${{ inputs.pr_number }}', 10);
            const repairMode = '${{ inputs.repair_mode }}';
            const repairOutcome = repairMode === 'premium_ai' ? '${{ steps.premium_repair.outcome }}' : '${{ steps.repair.outcome }}';
            const premiumStatus = '${{ steps.premium_repair.outputs.status }}' || 'skipped';
            const premiumApplied = Number.parseInt('${{ steps.premium_repair.outputs.applied_count }}' || '0', 10);
            const pushChanged = '${{ steps.push.outputs.changed }}' === 'true';
            const safetyOutcome = '${{ steps.safety_tests.outcome }}' || 'skipped';
            const buildOutcome = '${{ steps.build.outcome }}' || 'skipped';
            const deterministicStatus = '${{ steps.deterministic_repair.outputs.status }}' || 'unknown';
            const deterministicRepaired = Number.parseInt('${{ steps.deterministic_repair.outputs.repaired_count }}' || '0', 10);
            const deterministicBlocked = Number.parseInt('${{ steps.deterministic_repair.outputs.blocked_count }}' || '0', 10);
            let body = repairMode === 'premium_ai' ? '### MasjidWeb Premium AI repair\n\n' : '### MasjidWeb Autopilot repair\n\n';
            body += `Deterministic repair status: **${deterministicStatus}**. Repaired: **${Number.isFinite(deterministicRepaired) ? deterministicRepaired : 0}**. Blocked: **${Number.isFinite(deterministicBlocked) ? deterministicBlocked : 0}**.\n\n`;
            if (repairMode === 'premium_ai') {
              body += `Premium AI patch status: **${premiumStatus}**. Applied files: **${Number.isFinite(premiumApplied) ? premiumApplied : 0}**.\n\n`;
            }
            if (deterministicStatus === 'blocked' && !(repairMode === 'premium_ai' && premiumStatus === 'applied')) {
              body += 'Autopilot blocked this update to protect tenant data and Premium AI did not leave an applied repair. Review the repair artifacts for exact missing invariants.\n';
              body += 'Do **not** merge until a developer resolves the blocked files and the normal PR checks finish green.\n';
            } else if (repairOutcome === 'failure') {
              body += 'AI repair **failed**. Check the workflow logs for OpenRouter or conflict resolution errors.\n';
              body += 'If mechanical repair could not clear conflicts, the **Cursor core-update escalation** automation may run when PR CI fails (see `docs/CURSOR_CORE_UPDATE_ESCALATION.md`).\n';
            } else if (!pushChanged) {
              body += 'AI repair found **no committable changes** (no conflict markers or already clean).\n';
            } else if (safetyOutcome === 'failure') {
              body += 'AI repair **pushed** conflict resolutions, but **tenant safety tests failed** in this workflow.\n';
              body += 'Do **not** merge until failures are fixed and the normal PR checks finish green.\n';
            } else if (buildOutcome === 'failure') {
              body += 'AI repair **pushed** conflict resolutions, but the **production build failed** in this workflow.\n';
              body += 'Do **not** merge until the build is fixed and the normal PR checks finish green.\n';
            } else {
              body += repairMode === 'premium_ai'
                ? 'Premium AI repair **applied, verified, committed, and pushed** conflict resolutions to this branch.\n'
                : 'AI repair **committed and pushed** conflict resolutions to this branch.\n';
              body += 'This workflow passed local tenant safety tests and a production build, but **wait for the normal PR CI checks to finish green** before approving merge.\n';
              body += 'Refresh the admin dashboard status after PR CI completes.\n';
            }
            body += `\nWorkflow run: ${context.payload.repository.html_url}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
