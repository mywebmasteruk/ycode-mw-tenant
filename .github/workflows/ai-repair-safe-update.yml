name: Mechanical repair safe update PR

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Safe update pull request number
        required: true
        type: string
      mechanical_only:
        description: Only rerere + lockfile regen (no LLM)
        required: false
        type: boolean
        default: true
      max_llm_files:
        description: Max files to send to OpenRouter per run
        required: false
        type: string
        default: "10"
      repair_mode:
        description: Repair mode for blocked safe-update PRs
        required: false
        type: choice
        default: autopilot
        options:
          - autopilot
          - premium_ai
      openrouter_model:
        description: OpenRouter model ID or latest_claude_frontier
        required: false
        type: string
        default: "latest_claude_frontier"
      copilot_escalation_mode:
        description: Optional Copilot escalation when deterministic repair blocks
        required: false
        type: choice
        default: none
        options:
          - none
          - comment
          - issue
          - assign

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  ai-repair:
    runs-on: ubuntu-latest
    # Job ceiling must exceed the Premium AI repair budget (up to 45 min for a
    # multi-file run) PLUS the post-repair verification (deps install, tenant
    # guards, tenant tests, type-check, production build ≈ 15 min). A step can
    # never outlive its job, so this caps everything — keep it above the sum.
    timeout-minutes: 70
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve PR head branch
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number.parseInt('${{ inputs.pr_number }}', 10);
            if (!Number.isFinite(prNumber) || prNumber < 1) {
              core.setFailed('Invalid pr_number');
              return;
            }
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            core.setOutput('head_ref', pr.head.ref);
            core.setOutput('html_url', pr.html_url);

      - name: Checkout PR branch
        run: |
          git fetch origin "${{ steps.pr.outputs.head_ref }}"
          git checkout "${{ steps.pr.outputs.head_ref }}"

      - name: Copy AI repair tooling from main
        run: |
          git fetch origin main
          git checkout origin/main -- \
            scripts/ai-repair-safe-update.ts \
            scripts/core-update/run-autopilot-repair.ts \
            scripts/core-update/run-premium-ai-repair.ts \
            scripts/core-update/run-tenant-codemod-resolver.ts \
            scripts/core-update/run-tenant-codemod-resolver.test.ts \
            scripts/core-update/run-tenant-isolation-gate.ts \
            scripts/core-update/absolute-isolation-audit.ts \
            scripts/core-update/create-copilot-escalation.ts \
            scripts/reapply-tier2-seams.ts \
            scripts/check-autopilot-guard.ts \
            scripts/check-update-safety.ts \
            scripts/git-merge-hygiene.sh \
            lib/masjidweb/autopilot-repair.ts \
            lib/masjidweb/tenant-scope-codemod.ts \
            lib/masjidweb/tenant-scope-codemod.test.ts \
            lib/masjidweb/tenant-isolation-gate.ts \
            lib/masjidweb/tenant-isolation-gate.test.ts \
            lib/masjidweb/apply-tenant-id.ts \
            lib/masjidweb/premium-ai-patch.ts \
            lib/masjidweb/copilot-escalation.ts \
            lib/masjidweb/reapply-tier2-seams.ts \
            lib/masjidweb/openrouter-repair.ts \
            lib/masjidweb/merge-conflict-hunks.ts \
            lib/masjidweb/update-conflict-tiers.ts \
            lib/masjidweb/update-safety-check.ts \
            .gitattributes
          git checkout origin/main -- docs/masjidweb-core-seams.md 2>/dev/null || true

      - name: Fetch upstream Ycode for tier-2 seam re-apply
        run: |
          git remote add upstream https://github.com/ycode/ycode.git 2>/dev/null || true
          git fetch upstream main

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Configure merge hygiene
        run: bash scripts/git-merge-hygiene.sh

      - name: Restore rerere cache
        uses: actions/cache@v4
        with:
          path: .git/rr-cache
          key: rerere-${{ runner.os }}-v1
          restore-keys: |
            rerere-${{ runner.os }}-v1

      - name: Run deterministic Autopilot repair
        id: deterministic_repair
        continue-on-error: true
        env:
          AUTOPILOT_REPAIR_REPORT_PATH: /tmp/autopilot-repair-report.md
          AUTOPILOT_REPAIR_REPORT_JSON_PATH: /tmp/autopilot-repair-report.json
        run: npx --yes tsx scripts/core-update/run-autopilot-repair.ts

      # Deterministic Tier-2 resolver: resolve mechanical repository conflicts by
      # taking upstream + re-applying the tenant pattern (codemod), accepted only
      # when the isolation gate proves it. Runs in BOTH modes, BEFORE any LLM, so
      # mechanical files never reach the model (they were the invalid_json cases).
      - name: Deterministic Tier-2 codemod resolver
        id: tier2_codemod
        continue-on-error: true
        env:
          ISOLATION_GATE_BASELINE_REF: origin/main
        run: |
          git fetch --no-tags --depth=1 origin main || git fetch --no-tags origin main
          # The codemod + isolation gate use the TypeScript compiler API
          # (`import ts from 'typescript'`), so node_modules must exist before this
          # $0 deterministic pass — which runs before the verification install.
          # package-lock.json is still conflicted here, so install from package.json
          # without the lockfile (--no-package-lock) to avoid the merge-marker parse error.
          npm install --no-audit --no-fund --legacy-peer-deps --no-package-lock
          npx --yes tsx scripts/core-update/run-tenant-codemod-resolver.ts

      - name: Run AI conflict repair
        id: repair
        if: steps.deterministic_repair.outputs.status == 'failed' && inputs.mechanical_only == false && inputs.repair_mode == 'autopilot'
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ inputs.openrouter_model || vars.OPENROUTER_REPAIR_MODEL }}
          OPENROUTER_REPAIR_MODEL_HIGH_RISK: ${{ vars.OPENROUTER_REPAIR_MODEL_HIGH_RISK }}
          OPENROUTER_SITE_URL: ${{ vars.OPENROUTER_SITE_URL }}
          OPENROUTER_APP_NAME: ${{ vars.OPENROUTER_APP_NAME }}
          AI_REPAIR_MECHANICAL_ONLY: ${{ inputs.mechanical_only }}
          AI_REPAIR_SKIP_TIER2_LLM: "true"
          AI_REPAIR_MAX_LLM_FILES: ${{ inputs.max_llm_files }}
        run: npx --yes tsx scripts/ai-repair-safe-update.ts

      - name: Check Premium AI configuration
        if: steps.deterministic_repair.outputs.status != 'success' && inputs.repair_mode == 'premium_ai'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "OPENROUTER_API_KEY is missing. Add it as a GitHub Actions secret before running Premium AI Repair." >&2
            exit 2
          fi

      - name: Run Premium AI patch repair
        id: premium_repair
        if: steps.deterministic_repair.outputs.status != 'success' && inputs.repair_mode == 'premium_ai'
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_REPAIR_MODEL: ${{ inputs.openrouter_model || vars.OPENROUTER_REPAIR_MODEL || 'latest_claude_frontier' }}
          OPENROUTER_SITE_URL: ${{ vars.OPENROUTER_SITE_URL }}
          OPENROUTER_APP_NAME: ${{ vars.OPENROUTER_APP_NAME }}
          PREMIUM_AI_REPAIR_REPORT_PATH: /tmp/premium-ai-repair-report.md
          PREMIUM_AI_REPAIR_REPORT_JSON_PATH: /tmp/premium-ai-repair-report.json
          AUTOPILOT_REPAIR_REPORT_PATH: /tmp/autopilot-repair-report.md
          AUTOPILOT_REPAIR_REPORT_JSON_PATH: /tmp/autopilot-repair-report.json
          PREMIUM_AI_REPAIR_MAX_FILES: ${{ inputs.max_llm_files }}
          PREMIUM_AI_REPAIR_MAX_MODEL_CALLS: "24"
          PREMIUM_AI_REPAIR_MAX_BAD_RESPONSES: "5"
          PREMIUM_AI_REPAIR_MAX_CALL_MS: "300000"
          PREMIUM_AI_REPAIR_MAX_TOTAL_MS: "2700000"
          # Large repo files (e.g. pageRepository.ts ~44k chars) overflowed the
          # 24k full-file reply budget → finish_reason=length → invalid_json.
          PREMIUM_AI_REPAIR_MAX_TOKENS: "32000"
          PREMIUM_AI_REPAIR_MAX_HUNKS_PER_FILE: "2"
          # Enable hunk fallback: if the whole-file repair still truncates, resolve
          # the conflict hunk-by-hunk (tiny output, cannot truncate). The tenant-
          # isolation gate verifies the result regardless, so this stays fail-closed.
          PREMIUM_AI_REPAIR_ENABLE_HUNK_FALLBACK: "true"
        timeout-minutes: 50
        run: npx --yes tsx scripts/core-update/run-premium-ai-repair.ts

      - name: Upload deterministic Autopilot repair report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-update-autopilot-repair
          path: |
            /tmp/autopilot-repair-report.md
            /tmp/autopilot-repair-report.json
          if-no-files-found: ignore

      - name: Upload Premium AI repair report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-update-premium-ai-repair
          path: |
            /tmp/premium-ai-repair-report.md
            /tmp/premium-ai-repair-report.json
          if-no-files-found: ignore

      - name: Upload Premium AI partial checkpoint
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-update-premium-ai-partial-checkpoint
          path: |
            /tmp/premium-ai-repair-checkpoint.patch
            /tmp/premium-ai-checkpoints/**
          if-no-files-found: ignore

      - name: Create Copilot escalation request
        if: >-
          (
            (steps.deterministic_repair.outputs.status == 'blocked' && (inputs.repair_mode != 'premium_ai' || !contains(fromJSON('["applied","content_replacement_applied"]'), steps.premium_repair.outputs.status)))
            || (
              steps.deterministic_repair.outputs.status == 'failed'
              && (inputs.mechanical_only == true || (inputs.repair_mode == 'autopilot' && steps.repair.outcome != 'success') || (inputs.repair_mode == 'premium_ai' && !contains(fromJSON('["applied","content_replacement_applied"]'), steps.premium_repair.outputs.status)))
            )
          )
          && (
            inputs.copilot_escalation_mode != 'none'
            || vars.ENABLE_COPILOT_ESCALATION == 'true'
          )
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ inputs.pr_number }}
          AUTOPILOT_REPAIR_REPORT_PATH: /tmp/autopilot-repair-report.md
          AUTOPILOT_REPAIR_REPORT_JSON_PATH: /tmp/autopilot-repair-report.json
          WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COPILOT_ESCALATION_CREATE_ISSUE: ${{ inputs.copilot_escalation_mode == 'issue' || inputs.copilot_escalation_mode == 'assign' }}
          COPILOT_ESCALATION_ASSIGN_COPILOT: ${{ inputs.copilot_escalation_mode == 'assign' }}
        run: npx --yes tsx scripts/core-update/create-copilot-escalation.ts

      # The AI/codemod repair only resolves .ts/.tsx; package-lock.json lands
      # conflicted on nearly every update (upstream + fork both bump deps) and
      # would otherwise stall the wizard with leftover conflict markers. Resolve
      # it deterministically: take main's lockfile, then reconcile it to the
      # merged package.json. No LLM, no cost. Runs regardless of repair outcome
      # so even a blocked run leaves a clean lockfile for the next resume.
      - name: Resolve package-lock.json conflict (deterministic)
        run: |
          if grep -qE '^(<<<<<<<|=======|>>>>>>>) ' package-lock.json 2>/dev/null \
             || grep -qxE '(<<<<<<<|=======|>>>>>>>)' package-lock.json 2>/dev/null; then
            echo "package-lock.json is conflicted — resolving deterministically."
            git show origin/main:package-lock.json > package-lock.json
            npm install --package-lock-only --ignore-scripts --no-audit --no-fund --legacy-peer-deps
            if grep -qE '^(<<<<<<<|=======|>>>>>>>)' package-lock.json; then
              echo "Lockfile still has markers after regen — leaving for manual review."
            else
              git add package-lock.json
              git commit -m "fix(deps): resolve package-lock.json for safe update [automated]" || true
              git push origin HEAD || true
              echo "Resolved + committed package-lock.json."
            fi
          else
            echo "package-lock.json not conflicted; nothing to do."
          fi

      # Cross-run resume: the Premium AI step resolves a different subset of the
      # hard files each run (LLM nondeterminism). Without persisting partial
      # progress, every run restarts from the original conflicts and never
      # converges. Commit the cleanly-resolved files on a partial run so the next
      # run only retries what's left. The PR is NOT marked ready here — the full
      # isolation gate + type-check + build below still gate approval, so a
      # partial commit never implies the update is safe. Escape hatch if a
      # persisted file later fails verification: re-run Prepare to recreate the
      # PR branch from scratch.
      - name: Persist partial repairs for cross-run resume
        if: inputs.repair_mode == 'premium_ai' && steps.premium_repair.outputs.status == 'partial_failed'
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No resolved files to persist."
            exit 0
          fi
          # Safety: never persist a change that adds conflict markers.
          if git diff --cached | grep -qE '^\+(<<<<<<<|>>>>>>>|\|\|\|\|\|\|\|)'; then
            echo "Refusing to persist: a staged change still contains conflict markers."
            git reset
            exit 0
          fi
          git commit -m "fix(ai): persist partial safe-update repairs for resume [automated]"
          git push origin HEAD

      - name: Stop when repair remains blocked
        if: >-
          (steps.deterministic_repair.outputs.status == 'blocked' && (inputs.repair_mode != 'premium_ai' || !contains(fromJSON('["applied","content_replacement_applied"]'), steps.premium_repair.outputs.status)))
          || (
            steps.deterministic_repair.outputs.status == 'failed'
            && (
              inputs.mechanical_only == true
              || (inputs.repair_mode == 'autopilot' && steps.repair.outcome != 'success')
              || (inputs.repair_mode == 'premium_ai' && !contains(fromJSON('["applied","content_replacement_applied"]'), steps.premium_repair.outputs.status))
            )
          )
        run: |
          echo "Automated repair could not safely resolve all conflicts. See core-update repair artifacts."
          if [ "${{ inputs.copilot_escalation_mode }}" != "none" ] || [ "${{ vars.ENABLE_COPILOT_ESCALATION }}" = "true" ]; then
            echo "A constrained Copilot escalation request was created or updated. This is not merge approval."
          fi
          exit 2

      - name: Install dependencies for verification
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Critical-exports completeness check
        run: |
          # Write the list of files changed by the repair so the script only
          # checks files that were actually touched.
          git diff --name-only > /tmp/repair-changed-files.txt || true
          git diff --cached --name-only >> /tmp/repair-changed-files.txt || true
          bash scripts/check-repair-completeness.sh --changed-files /tmp/repair-changed-files.txt

      - name: Autopilot tenant guard
        env:
          AUTOPILOT_GUARD_REPORT_PATH: /tmp/autopilot-guard-report.md
          AUTOPILOT_GUARD_REPORT_JSON_PATH: /tmp/autopilot-guard-report.json
        run: |
          npx --yes tsx scripts/check-autopilot-guard.ts
          cat /tmp/autopilot-guard-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Tenant isolation guard
        run: bash scripts/check-tenant-isolation.sh

      # Static differential proof: the repaired branch must not drop any
      # applyTenantEq()/tenant_id scope that exists on the pre-update baseline.
      # Catches a merge/AI repair silently removing tenant scoping even where the
      # behavioral tests above have no coverage. Blocks approval on regression.
      - name: Tenant isolation differential gate
        env:
          ISOLATION_GATE_BASELINE_REF: origin/main
        run: |
          git fetch --no-tags --depth=1 origin main || git fetch --no-tags origin main
          npx --yes tsx scripts/core-update/run-tenant-isolation-gate.ts

      # Absolute scan of ALL lib/ + app/ files (not just the TIER2 set the
      # differential gate above checks). Fails the repair on any unscoped
      # tenant-table query that isn't marked `// isolation-ok:`. This is the same
      # whole-codebase backstop ci-build-check runs — but ci-build-check is
      # action_required on bot-authored PRs and may not auto-run, so we run it
      # here too. No new credentials needed; the verification install above
      # already provisioned node_modules.
      - name: Tenant isolation audit (whole codebase)
        run: npm run updates:isolation-audit

      - name: Type-check repaired branch
        run: npm run type-check

      - name: Upload Autopilot guard report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-update-autopilot-guard
          path: |
            /tmp/autopilot-guard-report.md
            /tmp/autopilot-guard-report.json
          if-no-files-found: ignore

      - name: Tenant safety tests
        id: safety_tests
        run: >-
          npx vitest run
          lib/masjidweb/bootstrap-tenant-owner.test.ts
          lib/masjidweb/provisioned-tenant-rbac.test.ts

      - name: Verify production build
        id: build
        if: steps.safety_tests.outcome == 'success'
        run: npm run build

      - name: Commit and push repairs
        id: push
        if: steps.safety_tests.outcome == 'success' && steps.build.outcome == 'success'
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No file changes to push."
            exit 0
          fi
          git commit -m "fix(ai): resolve safe update conflicts [automated]"
          git push origin HEAD
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Re-run update safety check
        if: steps.push.outputs.changed == 'true'
        continue-on-error: true
        env:
          UPDATE_BASE_REF: origin/main
        run: npm run updates:safety-check

      - name: Mark PR ready after successful repair
        if: >-
          steps.push.outputs.changed == 'true'
          && steps.safety_tests.outcome == 'success'
          && steps.build.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ inputs.pr_number }}"
          gh pr ready "$PR_NUMBER" --repo "$GITHUB_REPOSITORY"
          # The repair resolved all conflicts and the branch passed the isolation
          # gate + tenant tests + production build above, so the autopilot
          # "Status: blocked" in the PR body is now stale. The admin dashboard
          # derives its status from that line, so rewrite it to "ready" —
          # otherwise the dashboard keeps showing "blocked / Fix with AI" and the
          # Approve button never appears. (ci-build-check carries the same fix, but
          # it is action_required on bot-authored PRs and may not run; this step
          # always runs after a verified repair.)
          BODY=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json body --jq '.body')
          if printf '%s' "$BODY" | grep -qE '^Status:[[:space:]]*blocked'; then
            printf '%s' "$BODY" \
              | sed -E 's/^Status:[[:space:]]*blocked.*/Status: ready (AI repair verified; isolation gate + build green)/' \
              | sed -E 's/^Legacy status:[[:space:]]*blocked.*/Legacy status: ready/' \
              | grep -vE '^-?[[:space:]]*Autopilot blocked this update' > /tmp/repair_pr_body.md
            gh pr edit "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body-file /tmp/repair_pr_body.md
            echo "Rewrote PR #$PR_NUMBER body status: blocked -> ready."
          fi

      - name: Comment on pull request
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number.parseInt('${{ inputs.pr_number }}', 10);
            const repairMode = '${{ inputs.repair_mode }}';
            const repairOutcome = repairMode === 'premium_ai' ? '${{ steps.premium_repair.outcome }}' : '${{ steps.repair.outcome }}';
            const premiumStatus = '${{ steps.premium_repair.outputs.status }}' || 'skipped';
            const premiumApplied = Number.parseInt('${{ steps.premium_repair.outputs.applied_count }}' || '0', 10);
            const premiumCheckpointed = '${{ steps.premium_repair.outputs.checkpoint_persisted }}' === 'true';
            const premiumCheckpointCount = Number.parseInt('${{ steps.premium_repair.outputs.checkpoint_count }}' || '0', 10);
            const premiumUnresolved = Number.parseInt('${{ steps.premium_repair.outputs.unresolved_count }}' || '0', 10);
            const pushChanged = '${{ steps.push.outputs.changed }}' === 'true';
            const safetyOutcome = '${{ steps.safety_tests.outcome }}' || 'skipped';
            const buildOutcome = '${{ steps.build.outcome }}' || 'skipped';
            const deterministicStatus = '${{ steps.deterministic_repair.outputs.status }}' || 'unknown';
            const deterministicRepaired = Number.parseInt('${{ steps.deterministic_repair.outputs.repaired_count }}' || '0', 10);
            const deterministicBlocked = Number.parseInt('${{ steps.deterministic_repair.outputs.blocked_count }}' || '0', 10);
            let body = repairMode === 'premium_ai' ? '### MasjidWeb Premium AI repair\n\n' : '### MasjidWeb Autopilot repair\n\n';
            body += `Deterministic repair status: **${deterministicStatus}**. Repaired: **${Number.isFinite(deterministicRepaired) ? deterministicRepaired : 0}**. Blocked: **${Number.isFinite(deterministicBlocked) ? deterministicBlocked : 0}**.\n\n`;
            if (repairMode === 'premium_ai') {
              body += `Premium AI repair status: **${premiumStatus}**. Applied files: **${Number.isFinite(premiumApplied) ? premiumApplied : 0}**.\n`;
              if (premiumStatus === 'partial_failed') {
                body += 'Premium AI failed after capped attempts; do **not** rerun blindly until the strategy changes or a developer manually reduces the remaining conflict set.\n';
              }
              if (premiumCheckpointed) {
                body += `Partial checkpoint artifact: **persisted** for **${Number.isFinite(premiumCheckpointCount) ? premiumCheckpointCount : 0}** file(s). Unresolved files: **${Number.isFinite(premiumUnresolved) ? premiumUnresolved : 0}**.\n`;
                body += 'Download `core-update-premium-ai-partial-checkpoint` for review, but do not rerun Premium AI until the remaining files or strategy are changed.\n';
              }
              body += '\n';
            }
            if (deterministicStatus === 'blocked' && !(repairMode === 'premium_ai' && ['applied', 'content_replacement_applied'].includes(premiumStatus))) {
              body += premiumCheckpointed
                ? 'Premium AI checkpointed individually safe files, but unresolved files remain. Review the checkpoint and repair artifacts for exact remaining blockers.\n'
                : 'Autopilot blocked this update to protect tenant data and Premium AI did not leave an applied repair. Review the repair artifacts for exact missing invariants.\n';
              body += 'Do **not** merge until a developer resolves the blocked files and the normal PR checks finish green.\n';
            } else if (repairOutcome === 'failure') {
              body += 'AI repair **failed**. Check the workflow logs for OpenRouter or conflict resolution errors.\n';
              body += 'If mechanical repair could not clear conflicts, the **Cursor core-update escalation** automation may run when PR CI fails (see `docs/CURSOR_CORE_UPDATE_ESCALATION.md`).\n';
            } else if (!pushChanged) {
              body += 'AI repair found **no committable changes** (no conflict markers or already clean).\n';
            } else if (safetyOutcome === 'failure') {
              body += 'AI repair **pushed** conflict resolutions, but **tenant safety tests failed** in this workflow.\n';
              body += 'Do **not** merge until failures are fixed and the normal PR checks finish green.\n';
            } else if (buildOutcome === 'failure') {
              body += 'AI repair **pushed** conflict resolutions, but the **production build failed** in this workflow.\n';
              body += 'Do **not** merge until the build is fixed and the normal PR checks finish green.\n';
            } else {
              body += repairMode === 'premium_ai'
                ? 'Premium AI repair **applied, verified, committed, and pushed** conflict resolutions to this branch.\n'
                : 'AI repair **committed and pushed** conflict resolutions to this branch.\n';
              body += 'This workflow passed local tenant safety tests and a production build, but **wait for the normal PR CI checks to finish green** before approving merge.\n';
              body += 'Refresh the admin dashboard status after PR CI completes.\n';
            }
            body += `\nWorkflow run: ${context.payload.repository.html_url}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
