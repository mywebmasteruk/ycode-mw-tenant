name: Build and safety checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
      SUPABASE_SERVICE_ROLE_KEY: placeholder
      SITE_URL: https://placeholder.example.com
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch base branch for update safety check
        run: git fetch origin main

      - name: Type check
        run: npm run type-check

      - name: Update safety check
        env:
          UPDATE_BASE_REF: origin/main
          UPDATE_SAFETY_REPORT_PATH: /tmp/update-safety-report.md
          UPDATE_SAFETY_REPORT_JSON_PATH: /tmp/update-safety-report.json
        run: |
          npm run updates:safety-check
          cat /tmp/update-safety-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Autopilot tenant guard
        env:
          AUTOPILOT_GUARD_REPORT_PATH: /tmp/autopilot-guard-report.md
          AUTOPILOT_GUARD_REPORT_JSON_PATH: /tmp/autopilot-guard-report.json
        run: |
          npm run updates:autopilot-guard
          cat /tmp/autopilot-guard-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Autopilot reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-update-autopilot-reports
          path: |
            /tmp/update-safety-report.md
            /tmp/update-safety-report.json
            /tmp/autopilot-guard-report.md
            /tmp/autopilot-guard-report.json
          if-no-files-found: ignore

      - name: Tenant isolation tests
        run: bash scripts/check-tenant-isolation.sh

      - name: Tenant isolation audit (whole codebase)
        # Absolute scan of ALL lib/ + app/ files (not just the TIER2 set the
        # differential gate checks). Fails CI on any unscoped tenant-table query
        # that isn't marked `// isolation-ok:`. This is the backstop that closes
        # the blind spot which let cross-tenant leaks ship before 2026-06-28.
        run: npm run updates:isolation-audit

      - name: Build
        run: npm run build

      - name: Mark safe update PR ready when CI passes
        if: success() && startsWith(github.head_ref, 'safe-ycode-update/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git grep -l '^<<<<<<<' -- . ':(exclude)node_modules' 2>/dev/null | grep -q .; then
            echo "Conflict markers remain; not marking PR ready."
            exit 0
          fi
          PR_NUMBER="${{ github.event.pull_request.number }}"
          IS_DRAFT=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json isDraft --jq '.isDraft')
          if [ "$IS_DRAFT" = "true" ]; then
            gh pr ready "$PR_NUMBER" --repo "$GITHUB_REPOSITORY"
            echo "Marked PR #$PR_NUMBER ready for review."
          else
            echo "PR #$PR_NUMBER is already ready for review."
          fi
          # CI is green and conflicts are resolved, so the autopilot "blocked"
          # state in the PR body is stale. The admin dashboard derives its
          # status from the body's `Status:` line (parseAutopilotStatus), so
          # rewrite it to `ready` — otherwise the dashboard keeps showing
          # "blocked / Fix with AI" and the Approve button never appears even
          # though the update is safe and mergeable.
          BODY=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json body --jq '.body')
          if printf '%s' "$BODY" | grep -qE '^Status:[[:space:]]*blocked'; then
            printf '%s' "$BODY" \
              | sed -E 's/^Status:[[:space:]]*blocked.*/Status: ready (CI green; tenant-isolation gate passed)/' \
              | sed -E 's/^Legacy status:[[:space:]]*blocked.*/Legacy status: ready/' \
              | grep -vE '^-?[[:space:]]*Autopilot blocked this update' > /tmp/pr_body.md
            gh pr edit "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body-file /tmp/pr_body.md
            echo "Rewrote PR #$PR_NUMBER body status: blocked -> ready."
          fi
